name: CI/CD Pipeline

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11" # You can adjust this to your preferred Python version
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx  # Ensure pytest and test client are available

      - name: Run Pytest
        env:
          # We provide a dummy database URL for tests using SQLite
          DATABASE_URL: sqlite:///./test_ci.db
        run: |
          pytest tests/ -v
