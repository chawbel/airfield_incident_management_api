services:
  db:
    image: postgres:15
    container_name: airfield-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: airfield_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: airfield-api
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/airfield_db
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: >
      sh -c "
      alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

volumes:
  postgres_data:
